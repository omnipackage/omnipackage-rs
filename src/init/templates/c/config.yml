# omnipackage configuration — generated by `omnipackage init`.
# Docs: https://docs.omnipackage.org
#
# REQUIRED EDITS before first build:
#   1. Generate a GPG key for signing packages:
#        omnipackage gpg generate -n "Your Name" -e you@example.com --format base64
#      Put the printed value into the GPG_KEY environment variable (e.g. in .env).
#   2. Configure at least one repository below (S3 bucket or local fs).
#   3. Trim the `builds:` list to the distros you actually ship.
#
# Liquid tags ({{ ... }}, {% ... %}) are rendered at *build* time — leave them as-is.

# Where to read the package version from. The default points at version.h with a
# `#define VERSION "x.y.z"` line — edit `file:` and `regex:` if your version
# lives elsewhere (e.g. in the Makefile or a top-level VERSION file).
version_extractors:
  - name: default
    provider: "file"
    file:
      file: "__INIT_VERSION_FILE__"
      regex: '__INIT_VERSION_REGEX__'

# Shared metadata referenced by &common below. Must match the Debian/RPM
# package naming rules: lowercase letters, digits, dashes.
common: &common
  package_name: "__INIT_PACKAGE_NAME__"
  maintainer: "__INIT_MAINTAINER__"
  homepage: __INIT_HOMEPAGE__
  description: __INIT_DESCRIPTION__

# Where built packages get published. `localfs` is good for local testing;
# `s3` (any S3-compatible bucket — Cloudflare R2, MinIO, AWS S3) is what you
# use for real distribution. ${VAR} placeholders are read from .env.
repositories:
  - name: Local test
    gpg_private_key_base64: "${GPG_KEY}"
    provider: localfs
    <<: *common
    localfs:
      path: "${HOME}/__INIT_PACKAGE_NAME__-repo"

  - name: Example bucket
    provider: s3
    gpg_private_key_base64: "${GPG_KEY}"
    <<: *common
    s3:
      bucket: example-bucket
      path_in_bucket: "__INIT_PACKAGE_NAME__"
      bucket_public_url: "https://example-bucket.your-domain.com"
      endpoint: "https://s3.your-provider.com"
      access_key_id: "${ACCESS_KEY_ID}"
      secret_access_key: "${SECRET_ACCESS_KEY}"
      region: auto
      force_path_style: true

# Default build deps for RPM-family distros. Override per-distro below if a
# distro needs different package names. Add `runtime_dependencies` if your
# binary needs shared libraries at runtime.
rpm: &rpm
  <<: *common
  build_dependencies: ["gcc", "make"]
  rpm:
    spec_template: ".omnipackage/specfile.spec.liquid"

# Default build deps for Debian-family distros. `build-essential` pulls in
# gcc + make + libc headers.
deb: &deb
  <<: *common
  build_dependencies: ["build-essential"]
  deb:
    debian_templates: ".omnipackage/deb"

# Distros to build for. Delete any you don't ship — each one slows down
# `omnipackage build` by one container run. Add per-distro overrides
# (build_dependencies, runtime_dependencies, before_build_script) inline.
builds:
  - distro: "opensuse_15.3"
    <<: *rpm
  - distro: "opensuse_15.4"
    <<: *rpm
  - distro: "opensuse_15.5"
    <<: *rpm
