# omnipackage configuration — generated by `omnipackage init` (generic template).
# Docs: https://docs.omnipackage.org
#
# Could not auto-detect your project type, so this is a starter template.
# You'll need to fill in:
#   1. version_extractors — point at the file & regex where your version lives.
#   2. build_dependencies — distro packages needed to build your project.
#   3. specfile.spec.liquid — RPM build/install commands.
#   4. deb/rules.liquid — Debian build/install commands.
#   5. Generate a GPG key: omnipackage gpg generate -n "You" -e you@x --format base64
#   6. Configure repositories below.
#   7. Trim the `builds:` list to the distros you actually ship.
#
# Examples for common toolchains: https://github.com/omnipackage/examples
#
# Liquid tags ({{ ... }}, {% ... %}) render at *build* time — leave them as-is.

# Sample version extractors. Pick one and adjust to match your project.
version_extractors:
  - name: default
    provider: "file"
    file:
      file: "VERSION"
      regex: '^(\S+)$'
  # Cargo:
  # - name: default
  #   provider: file
  #   file: { file: "Cargo.toml", regex: 'version = "(.+)"' }
  # package.json:
  # - name: default
  #   provider: file
  #   file: { file: "package.json", regex: '"version": "(.+)"' }
  # Shell command (set the version directly or compute it):
  # - name: default
  #   provider: shell
  #   shell: { cmd: "echo 0.1.0" }

common: &common
  package_name: "__INIT_PACKAGE_NAME__"
  maintainer: "__INIT_MAINTAINER__"
  homepage: __INIT_HOMEPAGE__
  description: __INIT_DESCRIPTION__

repositories:
  - name: Local test
    gpg_private_key_base64: "${GPG_KEY}"
    provider: localfs
    <<: *common
    localfs:
      path: "${HOME}/__INIT_PACKAGE_NAME__-repo"

  - name: Example bucket
    provider: s3
    gpg_private_key_base64: "${GPG_KEY}"
    <<: *common
    s3:
      bucket: example-bucket
      path_in_bucket: "__INIT_PACKAGE_NAME__"
      bucket_public_url: "https://example-bucket.your-domain.com"
      endpoint: "https://s3.your-provider.com"
      access_key_id: "${ACCESS_KEY_ID}"
      secret_access_key: "${SECRET_ACCESS_KEY}"
      region: auto
      force_path_style: true

# Add the distro packages your build needs (compilers, libraries, etc.).
rpm: &rpm
  <<: *common
  build_dependencies: ["gcc", "make"]
  rpm:
    spec_template: ".omnipackage/specfile.spec.liquid"

deb: &deb
  <<: *common
  build_dependencies: ["build-essential"]
  deb:
    debian_templates: ".omnipackage/deb"

builds:
  - distro: "opensuse_15.6"
    <<: *rpm
  - distro: "opensuse_tumbleweed"
    <<: *rpm
  - distro: "fedora_40"
    <<: *rpm
  - distro: "fedora_41"
    <<: *rpm
  - distro: "fedora_42"
    <<: *rpm
  - distro: "fedora_rawhide"
    <<: *rpm
  - distro: "debian_12"
    <<: *deb
  - distro: "debian_13"
    <<: *deb
  - distro: "ubuntu_22.04"
    <<: *deb
  - distro: "ubuntu_24.04"
    <<: *deb
  - distro: "almalinux_9"
    <<: *rpm
  - distro: "rockylinux_9"
    <<: *rpm
