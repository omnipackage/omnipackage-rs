# omnipackage configuration — generated by `omnipackage init`.
# Docs: https://docs.omnipackage.org
#
# REQUIRED EDITS before first build:
#   1. Generate a GPG key: omnipackage gpg generate -n "You" -e you@x --format base64
#   2. Configure at least one repository below.
#   3. Trim the `builds:` list to the distros you actually ship.
#   4. Provide a <package>.desktop file and an icons/ tree at the repo root —
#      both copied into the package by the spec %install section.
#
# Liquid tags render at *build* time — leave them as-is.

# Reads version from src-tauri/Cargo.toml.
version_extractors:
  - name: default
    provider: "file"
    file:
      file: "__INIT_VERSION_FILE__"
      regex: '__INIT_VERSION_REGEX__'

common: &common
  package_name: "__INIT_PACKAGE_NAME__"
  maintainer: "__INIT_MAINTAINER__"
  homepage: __INIT_HOMEPAGE__
  description: __INIT_DESCRIPTION__

repositories:
  - name: Local test
    gpg_private_key_base64: "${GPG_KEY}"
    provider: localfs
    <<: *common
    localfs:
      path: "${HOME}/__INIT_PACKAGE_NAME__-repo"

  - name: Example bucket
    provider: s3
    gpg_private_key_base64: "${GPG_KEY}"
    <<: *common
    s3:
      bucket: example-bucket
      path_in_bucket: "__INIT_PACKAGE_NAME__"
      bucket_public_url: "https://example-bucket.your-domain.com"
      endpoint: "https://s3.your-provider.com"
      access_key_id: "${ACCESS_KEY_ID}"
      secret_access_key: "${SECRET_ACCESS_KEY}"
      region: auto
      force_path_style: true

rpm: &rpm
  <<: *common
  rpm:
    spec_template: ".omnipackage/specfile.spec.liquid"

deb: &deb
  <<: *common
  deb:
    debian_templates: ".omnipackage/deb"

# Tauri pulls in webkit2gtk, gtk3, and a long list of system libs whose
# names vary across distro generations. AlmaLinux/RockyLinux are absent here
# because webkit2gtk-4.1 isn't available there — add only if you can satisfy
# the deps yourself.
builds:
  - distro: "opensuse_15.4"
    build_dependencies: ["make", "webkit2gtk3-soup2-devel", "webkit2gtk3-devel", "libopenssl-devel", "curl", "wget", "file", "libappindicator3-1", "librsvg-devel", "glib2-devel", "libsoup-devel", "libjavascriptcoregtk-4_1-0"]
    before_build_script: ".omnipackage/install_rust.sh"
    <<: *rpm
  - distro: "opensuse_15.5"
    build_dependencies: ["webkit2gtk3-soup2-devel", "libopenssl-devel", "curl", "wget", "file", "libappindicator3-1", "librsvg-devel", "glib2-devel", "libsoup-devel", "libjavascriptcoregtk-4_1-0", "libwebkit2gtk-4_1-0", "webkit2gtk4-devel", "libsoup2-devel", "webkit2gtk3-devel"]
    before_build_script: ".omnipackage/install_rust.sh"
    <<: *rpm
  - distro: "opensuse_15.6"
    build_dependencies: ["rust", "cargo", "make", "webkit2gtk3-soup2-devel", "libopenssl-devel", "curl", "wget", "file", "libappindicator3-1", "librsvg-devel", "glib2-devel", "libsoup-devel", "libjavascriptcoregtk-4_1-0", "libwebkit2gtk-4_1-0", "webkit2gtk4-devel", "libsoup2-devel", "webkit2gtk3-devel"]
