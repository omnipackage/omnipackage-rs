<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Install mpz</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #f8f9fa;
    --surface:   #ffffff;
    --border:    #dee2e6;
    --text:      #212529;
    --muted:     #6c757d;
    --hover-bg:  #f1f3f5;
    --gpg-bg:    #f1f3f5;
    --gpg-text:  #495057;
    --link:      #0d6efd;
    --footer:    #adb5bd;
    --toggle-bg: #e9ecef;
  }

  [data-theme="dark"] {
    --bg:        #0f1117;
    --surface:   #1a1d27;
    --border:    #2e3240;
    --text:      #e2e4eb;
    --muted:     #7c8196;
    --hover-bg:  #22263a;
    --gpg-bg:    #22263a;
    --gpg-text:  #a0a8c0;
    --link:      #5b9cf6;
    --footer:    #4a5068;
    --toggle-bg: #22263a;
  }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: 2rem 1rem;
    transition: background .2s, color .2s;
  }

  .container { max-width: 900px; margin: 0 auto; }

  header { text-align: center; margin-bottom: 2.5rem; position: relative; }
  header h1 { font-size: 2rem; margin: .5rem 0 .25rem; }
  header blockquote {
    color: var(--muted);
    font-style: italic;
    border-left: 3px solid var(--border);
    padding-left: .75rem;
    margin: .5rem auto;
    max-width: 400px;
    text-align: left;
  }
  header blockquote a { color: var(--link); }

  .theme-toggle {
    position: absolute;
    top: 0; right: 0;
    display: flex;
    background: var(--toggle-bg);
    border-radius: 20px;
    padding: 3px;
    gap: 2px;
    border: 1px solid var(--border);
    transition: background .2s, border-color .2s;
  }
  .theme-toggle button {
    background: none;
    border: none;
    border-radius: 16px;
    padding: 4px 8px;
    font-size: .75rem;
    cursor: pointer;
    color: var(--muted);
    transition: background .15s, color .15s;
    line-height: 1;
  }
  .theme-toggle button.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: 0 1px 3px rgba(0,0,0,.15);
  }

  /* ── Distro family section label ── */
  .distro-label {
    display: flex;
    align-items: center;
    gap: .6rem;
    font-size: .7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    margin: 1.5rem 0 .5rem;
  }
  .distro-label svg { width: 18px; height: 18px; flex-shrink: 0; }
  .distro-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Accordion ── */
  .accordion {
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: .5rem;
    background: var(--surface);
    transition: background .2s, border-color .2s;
  }
  .accordion-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: .85rem 1.1rem;
    cursor: pointer;
    user-select: none;
    font-weight: 600;
    font-size: .95rem;
    transition: background .15s;
  }
  .accordion-header:hover { background: var(--hover-bg); }
  .accordion-header .chevron {
    width: 16px; height: 16px;
    flex-shrink: 0;
    transition: transform .3s ease;
    color: var(--muted);
  }
  .accordion.open > .accordion-header .chevron { transform: rotate(180deg); }

  .accordion-body {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows .3s ease;
  }
  .accordion.open > .accordion-body { grid-template-rows: 1fr; }

  .accordion-inner {
    overflow: hidden;
    padding: 0 1.1rem;
    transition: padding .3s ease;
  }
  .accordion.open > .accordion-body > .accordion-inner { padding: 0 1.1rem 1.1rem; }

  /* ── Step labels ── */
  .step-label {
    font-size: .7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--muted);
    margin-bottom: .35rem;
    margin-top: .9rem;
  }

  /* ── Code block ── */
  .code-block {
    display: flex;
    align-items: flex-start;
    background: #1e1e2e;
    color: #cdd6f4;
    border-radius: 6px;
    font-family: ui-monospace, 'Fira Code', monospace;
    font-size: .8rem;
    line-height: 1.6;
  }
  .code-block .code-scroll {
    flex: 1;
    overflow-x: auto;
    padding: .85rem 1rem;
    white-space: pre;
  }
  .copy-btn {
    flex-shrink: 0;
    align-self: flex-start;
    margin: .5rem .5rem 0 0;
    background: #313244;
    border: none;
    color: #cdd6f4;
    border-radius: 4px;
    padding: .25rem .6rem;
    font-size: .7rem;
    cursor: pointer;
    transition: background .15s;
  }
  .copy-btn:hover { background: #45475a; }
  .copy-btn.copied { background: #a6e3a1; color: #1e1e2e; }

  /* ── GPG collapsible ── */
  .gpg-toggle {
    display: inline-flex;
    align-items: center;
    gap: .35rem;
    margin-top: .9rem;
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: .2rem .6rem;
    font-size: .7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--muted);
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  .gpg-toggle:hover { background: var(--hover-bg); }
  .gpg-toggle .gpg-chevron {
    width: 12px; height: 12px;
    transition: transform .25s ease;
  }
  .gpg-toggle.open .gpg-chevron { transform: rotate(180deg); }

  .gpg-body {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows .25s ease;
  }
  .gpg-body.open { grid-template-rows: 1fr; }
  .gpg-inner { overflow: hidden; }

  .gpg-block {
    background: var(--gpg-bg);
    border-radius: 6px;
    padding: .75rem 1rem;
    font-family: ui-monospace, monospace;
    font-size: .75rem;
    color: var(--gpg-text);
    white-space: pre;
    overflow-x: auto;
    margin-top: .35rem;
    transition: background .2s, color .2s;
  }

  /* ── Download link ── */
  .download-label {
    font-size: .8rem;
    color: var(--muted);
    margin-top: .85rem;
    display: block;
  }
  .download-link {
    font-size: .85rem;
    display: inline-block;
    color: var(--link);
  }

  footer { text-align: center; margin-top: 2.5rem; color: var(--footer); font-size: .8rem; }
  footer a { color: var(--footer); }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="theme-toggle" id="themeToggle">
      <button data-mode="light" title="Light">☀️</button>
      <button data-mode="auto"  title="Auto">⚙️</button>
      <button data-mode="dark"  title="Dark">🌙</button>
    </div>
    <h1>📦 Install {{ package_name }}</h1>
    <blockquote>
      {{ description }}<br>
      <a href="{{ homepage }}">{{ homepage }}</a>
    </blockquote>
  </header>
  <div id="root"></div>
  <footer>Powered by <a href="https://omnipackage.org">OmniPackage</a></footer>
</div>

<!-- Accordion item template -->
<template id="tpl-accordion">
  <div class="accordion">
    <div class="accordion-header">
      <span class="acc-name"></span>
      <svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="4 6 8 10 12 6"/>
      </svg>
    </div>
    <div class="accordion-body">
      <div class="accordion-inner">
        <div class="step-label">Installation steps</div>
        <div class="code-block">
          <span class="code-scroll acc-steps"></span>
          <button class="copy-btn">Copy</button>
        </div>

        <button class="gpg-toggle">
          GPG key
          <svg class="gpg-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4 6 8 10 12 6"/>
          </svg>
        </button>
        <div class="gpg-body">
          <div class="gpg-inner">
            <div class="gpg-block acc-gpg"></div>
          </div>
        </div>

        <span class="download-label">Or download package directly:</span>
        <a class="download-link acc-download" href="#"></a>
      </div>
    </div>
  </div>
</template>

<script>
/* ── Theme ─────────────────────────────────────────────────────── */
const mq = window.matchMedia('(prefers-color-scheme: dark)');

function applyTheme(mode) {
  const dark = mode === 'dark' || (mode === 'auto' && mq.matches);
  document.documentElement.dataset.theme = dark ? 'dark' : '';
  document.querySelectorAll('#themeToggle button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });
}

let currentMode = localStorage.getItem('theme') || 'auto';
applyTheme(currentMode);

document.getElementById('themeToggle').addEventListener('click', e => {
  const btn = e.target.closest('button[data-mode]');
  if (!btn) return;
  currentMode = btn.dataset.mode;
  localStorage.setItem('theme', currentMode);
  applyTheme(currentMode);
});

mq.addEventListener('change', () => { if (currentMode === 'auto') applyTheme('auto'); });

/* ── Family metadata ────────────────────────────────────────────── */
const families = {
  opensuse: {
    label: 'openSUSE',
    icon: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="48" fill="#73ba25"/>
      <path d="M50 18a32 32 0 1 0 32 32A32 32 0 0 0 50 18zm0 52a20 20 0 1 1 20-20 20 20 0 0 1-20 20z" fill="#fff"/>
    </svg>`,
  },
  fedora: {
    label: 'Fedora',
    icon: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="48" fill="#3c6eb4"/>
      <path d="M50 22c-15.46 0-28 12.54-28 28s12.54 28 28 28 28-12.54 28-28S65.46 22 50 22zm0 10a18 18 0 0 1 18 18H52V34.1A18 18 0 0 1 50 32zm-2 2.1V50H32a18 18 0 0 1 16-15.9zM32 52h16v15.9A18 18 0 0 1 32 52zm18 15.9V52h16a18 18 0 0 1-16 15.9z" fill="#fff"/>
    </svg>`,
  },
  debian: {
    label: 'Debian',
    icon: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="48" fill="#d70a53"/>
      <path d="M56 26c-11 0-22 7-25 18 3-4 8-7 14-7 9 0 15 7 15 16s-7 17-17 17c-12 0-19-9-19-20 0-16 13-30 32-30a34 34 0 0 1 0 68c-12 0-22-5-28-14 4 4 10 7 17 7 13 0 22-10 22-23s-9-22-21-22c-5 0-9 2-12 5 2-7 9-12 17-12a16 16 0 0 1 0 32 16 16 0 0 1-11-4c2 3 5 4 9 4 8 0 14-7 14-15s-6-16-14-16z" fill="#fff"/>
    </svg>`,
  },
  ubuntu: {
    label: 'Ubuntu',
    icon: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="48" fill="#e95420"/>
      <circle cx="50" cy="50" r="16" fill="none" stroke="#fff" stroke-width="9"/>
      <circle cx="50" cy="22" r="7" fill="#fff"/>
      <circle cx="25.3" cy="64" r="7" fill="#fff"/>
      <circle cx="74.7" cy="64" r="7" fill="#fff"/>
    </svg>`,
  },

    label: 'AlmaLinux',
    icon: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">

      <path d="M50 20 L62 44 L88 44 L67 59 L75 83 L50 68 L25 83 L33 59 L12 44 L38 44 Z" fill="#47a3f3"/>
    </svg>`,

  rockylinux: {
    label: 'Rocky Linux',
    icon: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="48" fill="#10b981"/>
      <path d="M50 22 L72 35 L72 65 L50 78 L28 65 L28 35 Z" fill="none" stroke="#fff" stroke-width="6"/>

      <path d="M50 25 Q65 38 65 50 Q65 68 50 75 Q35 68 35 50 Q35 38 50 25Z" fill="#00adef"/>
      <circle cx="50" cy="33" r="7" fill="#fff"/>
    </svg>`,
  },
};

/* ── Render ────────────────────────────────────────────────────── */
const distros  = JSON.parse(document.getElementById('data').textContent);
const template = document.getElementById('tpl-accordion');
const root     = document.getElementById('root');

function distroName(distro_id, family) {
  const prefix = families[family]?.label ?? family;
  const suffix = distro_id
    .slice(family.length)
    .replace(/_/g, ' ')
    .trim();
  return suffix ? `${prefix} ${suffix}` : prefix;
}

function renderAccordion(distro) {
  const node = template.content.cloneNode(true);
  const acc  = node.querySelector('.accordion');
  const pkg  = distro.download_url.split('/').pop();

  acc.querySelector('.acc-name').textContent     = distroName(distro.distro_id, distro.distro_family);
  acc.querySelector('.acc-steps').textContent    = distro.install_steps;
  acc.querySelector('.acc-gpg').textContent      = distro.gpg_key;
  acc.querySelector('.acc-download').href        = distro.download_url;
  acc.querySelector('.acc-download').textContent = pkg;

  // Main accordion toggle
  acc.querySelector('.accordion-header').addEventListener('click', () => {
    acc.classList.toggle('open');
  });

  // Copy button
  acc.querySelector('.copy-btn').addEventListener('click', e => {
    e.stopPropagation();
    const btn = e.currentTarget;
    navigator.clipboard.writeText(distro.install_steps).then(() => {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1800);
    });
  });

  // GPG toggle
  const gpgBtn  = acc.querySelector('.gpg-toggle');
  const gpgBody = acc.querySelector('.gpg-body');
  gpgBtn.addEventListener('click', () => {
    const open = gpgBody.classList.toggle('open');
    gpgBtn.classList.toggle('open', open);
  });

  return acc;
}

// Group distros by family, preserving first-seen order
const familyOrder = [];
const byFamily = {};
distros.forEach(d => {
  if (!byFamily[d.distro_family]) {
    familyOrder.push(d.distro_family);
    byFamily[d.distro_family] = [];
  }
  byFamily[d.distro_family].push(d);
});

familyOrder.forEach(family => {
  const meta = families[family] ?? { label: family, icon: '' };

  const labelEl = document.createElement('div');
  labelEl.className = 'distro-label';
  labelEl.innerHTML = meta.icon + meta.label;
  root.appendChild(labelEl);

  byFamily[family].forEach(d => root.appendChild(renderAccordion(d)));
});
</script>
