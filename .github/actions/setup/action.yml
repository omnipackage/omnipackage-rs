name: "Setup omnipackage"
description: "Installs Podman and omnipackage, making it available on PATH"
author: "Oleg Antonyan"

branding:
  icon: "package"
  color: "orange"

inputs:
  version:
    description: "omnipackage-rs branch or tag to build"
    required: false
    default: "master"
  rust-toolchain:
    description: "Rust toolchain used to compile omnipackage"
    required: false
    default: "stable"

outputs:
  omnipackage-path:
    description: "Absolute path to the installed omnipackage binary"
    value: /usr/local/bin/omnipackage

runs:
  using: "composite"
  steps:
    - name: Install Podman
      shell: bash
      run: |
        if command -v podman &>/dev/null; then
          echo "✓ Podman already available: $(podman --version)"
          exit 0
        fi
        sudo apt-get update -qq
        sudo apt-get install -y -qq podman
        echo "✓ Podman installed: $(podman --version)"

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.rust-toolchain }}

    - name: Build and install omnipackage
      shell: bash
      run: |
        git clone --depth 1 --branch "${{ inputs.version }}" https://github.com/omnipackage/omnipackage-rs.git /tmp/omnipackage-rs
        cargo build --release --manifest-path /tmp/omnipackage-rs/Cargo.toml
        sudo install -m 755 /tmp/omnipackage-rs/target/release/omnipackage /usr/local/bin/omnipackage
        echo "✓ omnipackage installed: $(omnipackage --version)"
