name: Release packages - master

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  x86_64:
    uses: ./.github/workflows/_release-packages.yml
    secrets: inherit
    with:
      repository: "master"
      version_extractor: "git"
      arch: "x86_64"
      runs_on: "ubuntu-24.04"

  aarch64:
    uses: ./.github/workflows/_release-packages.yml
    secrets: inherit
    with:
      repository: "master_aarch64"
      version_extractor: "git"
      arch: "aarch64"
      runs_on: "ubuntu-24.04-arm"
      # archlinux:latest has no arm64 image (Arch ARM is a separate project)
      skip_distros: '["arch"]'
