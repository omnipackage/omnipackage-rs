name: Release packages - master

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]

jobs:
  run:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    concurrency:
      group: omnipackage-master
      cancel-in-progress: false

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq podman

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/checkout@v6

      - name: Build binary
        run: |
          cargo build --release
          sudo install -m 755 target/release/omnipackage /usr/local/bin/omnipackage
          cargo clean

      - run: echo "${{ secrets.OMNIPACKAGE_DOTENV }}" > .env

      - name: Release packages
        run: omnipackage release . --container-output null --build-dir /tmp/omnipackage --repository "Cloudflare R2 master"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: |
            /tmp/omnipackage/**/build.log
            /tmp/omnipackage/**/publish.log
