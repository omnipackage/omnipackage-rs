name: Image cache refresh

on:
  workflow_dispatch:
  schedule:
    - cron: '44 6 * * 1'

permissions:
  packages: write

jobs:
  x86_64:
    uses: ./.github/workflows/_prime.yml
    secrets: inherit
    with:
      arch: "x86_64"
      runs_on: "ubuntu-24.04"

  aarch64:
    uses: ./.github/workflows/_prime.yml
    secrets: inherit
    with:
      arch: "aarch64"
      runs_on: "ubuntu-24.04-arm"
      # archlinux:latest has no arm64 image (Arch ARM is a separate project)
      skip_distros: '["arch"]'
