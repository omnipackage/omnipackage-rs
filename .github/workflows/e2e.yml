name: E2E

on:
  workflow_dispatch:
  schedule:
    # 14th of every month, 21:00 UTC (≈23:00 CEST / 22:00 CET — UTC+2 night).
    # Drifts 1h with DST; acceptable for monthly cadence.
    - cron: '0 21 14 * *'

permissions:
  contents: read

jobs:
  bootstrap-binary:
    runs-on: ubuntu-latest
    steps:
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/checkout@v6
      - run: cargo build --release
      - uses: actions/upload-artifact@v6
        with:
          name: omnipackage-binary-e2e
          path: target/release/omnipackage
          retention-days: 1

  list-distros:
    # Single source of truth for distros: DISTROS_DEFAULT in tests/e2e/run.sh.
    runs-on: ubuntu-latest
    outputs:
      distros: ${{ steps.x.outputs.distros }}
    steps:
      - uses: actions/checkout@v6
      - id: x
        run: |
          line=$(awk -F\" '/^DISTROS_DEFAULT=/ {print $2; exit}' tests/e2e/run.sh)
          json=$(printf '%s\n' $line | jq -R . | jq -sc .)
          echo "distros=$json" >> "$GITHUB_OUTPUT"

  e2e:
    needs: [bootstrap-binary, list-distros]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro: ${{ fromJson(needs.list-distros.outputs.distros) }}
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq podman gpg
      - uses: actions/download-artifact@v8
        with:
          name: omnipackage-binary-e2e
          path: /usr/local/bin
      - run: chmod +x /usr/local/bin/omnipackage
      - name: Run e2e for ${{ matrix.distro }}
        env:
          OMNIPACKAGE_BIN: /usr/local/bin/omnipackage
          TMP_ROOT: ${{ runner.temp }}/omni-e2e
          DISTROS: ${{ matrix.distro }}
        # run.sh appends a per-distro markdown summary to $GITHUB_STEP_SUMMARY.
        run: bash tests/e2e/run.sh
