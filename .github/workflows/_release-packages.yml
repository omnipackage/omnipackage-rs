on:
  workflow_call:
    inputs:
      repository:
        required: true
        type: string
      version_extractor:
        required: true
        type: string

jobs:
  bootstrap-binary:
    strategy:
      matrix:
        include:
          - { arch: x86_64, runs_on: ubuntu-24.04 }
          - { arch: aarch64, runs_on: ubuntu-24.04-arm }
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/checkout@v6
      - run: cargo build --release
      - uses: actions/upload-artifact@v6
        with:
          name: omnipackage-binary-${{ matrix.arch }}
          path: target/release/omnipackage
          retention-days: 1

  list-distros:
    needs: bootstrap-binary
    runs-on: ubuntu-24.04
    outputs:
      distros: ${{ steps.get-distros.outputs.distros }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: omnipackage-binary-x86_64
          path: /usr/local/bin
      - run: chmod +x /usr/local/bin/omnipackage
      - uses: actions/checkout@v6
      - id: get-distros
        run: echo "distros=$(omnipackage info --list-distros . --format json)" >> "$GITHUB_OUTPUT"

  release:
    needs: [bootstrap-binary, list-distros]
    runs-on: ${{ matrix.runs_on }}
    concurrency:
      # arches write disjoint S3 prefixes; one group per arch, else a pending job is dropped
      group: omnipackage-${{ inputs.repository }}${{ matrix.repo_suffix }}-${{ matrix.distro }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        distro: ${{ fromJson(needs.list-distros.outputs.distros) }}
        arch: [x86_64, aarch64]
        include:
          - { arch: x86_64, runs_on: ubuntu-24.04, repo_suffix: "" }
          - { arch: aarch64, runs_on: ubuntu-24.04-arm, repo_suffix: "_aarch64" }
        exclude:
          # archlinux:latest has no arm64 image (Arch ARM is a separate project)
          - { distro: arch, arch: aarch64 }
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq podman gpg
      - uses: actions/download-artifact@v8
        with:
          name: omnipackage-binary-${{ matrix.arch }}
          path: /usr/local/bin
      - run: chmod +x /usr/local/bin/omnipackage
      - run: |
          echo "${{ secrets.OMNIPACKAGE_DOTENV }}" > .env
          echo "GITHUB_REGISTRY_USERNAME=${{ github.actor }}" >> .env
          echo "GITHUB_REGISTRY_PASSWORD=${{ secrets.GITHUB_TOKEN }}" >> .env
          echo "GITHUB_REGISTRY_NAMESPACE=${{ github.repository_owner }}" >> .env
      - run:  omnipackage release . --build-dir $RUNNER_TEMP/_omp --repository "${{ inputs.repository }}${{ matrix.repo_suffix }}" --distros "${{ matrix.distro }}" --version-extractor "${{ inputs.version_extractor }}" --image-cache github_${{ matrix.arch }}
