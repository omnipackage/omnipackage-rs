name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo check
      - run: cargo clippy -- -D warnings
      - run: cargo test
