name: 'Install omnipackage'
description: 'Install the omnipackage CLI (build & distribute RPM, DEB & Arch packages)'
branding:
  icon: 'package'
  color: 'green'

outputs:
  version:
    description: 'Installed omnipackage version.'
    value: ${{ steps.install.outputs.version }}

runs:
  using: 'composite'
  steps:
    - name: Install omnipackage
      id: install
      shell: bash
      env:
        ACTION_REF: ${{ github.action_ref }}
      run: |
        set -euo pipefail
        case "$ACTION_REF" in
          master) seg="master" ;;
          *)      seg="stable" ;;
        esac
        case "$(uname -m)" in
          x86_64|amd64)  : ;;
          aarch64|arm64) seg="${seg}-aarch64" ;;
          *) echo "::error::unsupported CPU architecture: $(uname -m)"; exit 1 ;;
        esac
        url="https://repositories.omnipackage.org/omnipackage-rs/${seg}/install.sh"
        echo "Installing omnipackage from $url"
        curl -fsSL "$url" | sh -s -- -y
        echo "version=$(omnipackage --version | head -n1)" >> "$GITHUB_OUTPUT"
