image_caches:
  - name: local
    provider: local
    image_tag: sample-project-latest

  - name: github
    provider: registry
    image_tag: sample-project-latest
    registry:
      url: ghcr.io
      namespace: '${IMAGE_CACHE_REGISTRY_NAMESPACE}'
      username: '${IMAGE_CACHE_REGISTRY_USERNAME}'
      password: '${IMAGE_CACHE_REGISTRY_PASSWORD}'

version_extractors:
  - name: "git"
    provider: "shell"
    shell:
      command: printf '0~master.%s' $(git rev-list --count HEAD)

  - name: "stable"
    provider: 'file'
    file:
      file: 'version.h'
      regex: 'VERSION "(.+)"'

secrets:
  TOP_SECRET_KEY: "${TOP_SECRET_KEY}"

common: &common
  package_name: 'sample-project'
  maintainer: 'Chuck Norris <chuck@norr.is>'
  homepage: https://omnipackage.org/
  description: Sample project for tests

repositories:
  - name: test repo on Cloudflare R2
    provider: s3
    gpg_private_key_base64: "${GPG_PRIVATE_KEY_BASE64}"
    <<: *common
    s3:
      bucket: repositories-test
      path_in_bucket: 'sample-project'
      bucket_public_url: 'https://repositories-test.omnipackage.org'
      endpoint: '${CLOUDFLARE_R2_ENDPOINT}'
      access_key_id: '${CLOUDFLARE_R2_ACCESS_KEY_ID}'
      secret_access_key: '${CLOUDFLARE_R2_SECRET_ACCESS_KEY}'
      region: auto
      force_path_style: true
      cloudflare_zone_id: '${CLOUDFLARE_ZONE_ID}'
      cloudflare_api_token: '${CLOUDFLARE_API_TOKEN}'
  - name: Local test
    <<: *common
    gpg_private_key_base64: "${GPG_PRIVATE_KEY_BASE64}"
    provider: localfs
    localfs:
      path: /tmp/omnipackage-repos

rpm: &rpm
  <<: *common
  build_dependencies: ['gcc', 'make']
  rpm:
    spec_template: '.omnipackage/specfile.spec.liquid'

deb: &deb
  <<: *common
  build_dependencies: ['build-essential']
  deb:
    debian_templates: '.omnipackage/deb'

